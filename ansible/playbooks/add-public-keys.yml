- hosts: "*"
  become: yes
  tasks:
    - name: add public keys
      ansible.posix.authorized_key:
        user: edward
        state: present
        key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
    - name: change sudoers file
      lineinfile:
        path: /etc/sudoers
        state: present
        regexp: "^%sudo"
        line: "%sudo ALL=(ALL) NOPASSWD: ALL"
        validate: /usr/sbin/visudo -cf %s
